<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Embed Studio Test Harness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; height: 100vh; }

    .panel { width: 380px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; overflow: hidden; }
    .panel-header { padding: 16px 20px; border-bottom: 1px solid #334155; }
    .panel-header h1 { font-size: 16px; font-weight: 600; color: #f1f5f9; margin-bottom: 4px; }
    .panel-header p { font-size: 12px; color: #94a3b8; }
    .panel-body { flex: 1; overflow-y: auto; padding: 16px 20px; }

    .section { margin-bottom: 20px; }
    .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 8px; }

    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    button { padding: 6px 12px; font-size: 12px; border: 1px solid #475569; border-radius: 6px; background: #334155; color: #e2e8f0; cursor: pointer; transition: all 0.15s; }
    button:hover { background: #475569; border-color: #64748b; }
    button.primary { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    button.primary:hover { background: #2563eb; }
    button.success { background: #059669; border-color: #059669; color: #fff; }
    button.success:hover { background: #047857; }
    button.danger { background: #dc2626; border-color: #dc2626; color: #fff; }
    button.danger:hover { background: #b91c1c; }

    select, input { padding: 6px 10px; font-size: 12px; border: 1px solid #475569; border-radius: 6px; background: #0f172a; color: #e2e8f0; width: 100%; margin-bottom: 8px; }

    textarea { width: 100%; min-height: 140px; padding: 10px; font-size: 12px; font-family: 'SF Mono', 'Cascadia Code', monospace; border: 1px solid #475569; border-radius: 6px; background: #0f172a; color: #e2e8f0; resize: vertical; tab-size: 2; line-height: 1.5; }

    .log-area { flex: none; height: 200px; border-top: 1px solid #334155; display: flex; flex-direction: column; }
    .log-area .section-title { padding: 8px 20px; margin: 0; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    .log-area .section-title button { padding: 2px 8px; font-size: 10px; }
    .log-entries { flex: 1; overflow-y: auto; padding: 8px 20px; font-family: monospace; font-size: 11px; }
    .log-entry { padding: 3px 0; border-bottom: 1px solid #1e293b; }
    .log-entry .time { color: #64748b; margin-right: 8px; }
    .log-entry.inbound { color: #38bdf8; }
    .log-entry.outbound { color: #a78bfa; }
    .log-entry.error { color: #f87171; }

    .canvas-area { flex: 1; display: flex; flex-direction: column; }
    .canvas-toolbar { padding: 8px 16px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 8px; }
    .canvas-toolbar .status { font-size: 12px; color: #94a3b8; margin-left: auto; }
    .canvas-toolbar .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .dot.waiting { background: #eab308; }
    .dot.ready { background: #22c55e; }
    .dot.loaded { background: #3b82f6; }
    .dot.error { background: #ef4444; }

    iframe { flex: 1; border: none; background: #fff; }
  </style>
</head>
<body>
  <div class="panel">
    <div class="panel-header">
      <h1>Embed Studio Test Harness</h1>
      <p>Control the embedded canvas via postMessage</p>
    </div>

    <div class="panel-body">
      <div class="section">
        <div class="section-title">1. Asset Type</div>
        <select id="assetType">
          <option value="form">Form</option>
          <option value="workflow">Workflow</option>
          <option value="sequence">Sequence</option>
        </select>
        <button onclick="reloadIframe()" class="primary" style="width:100%">Reload Iframe</button>
      </div>

      <div class="section">
        <div class="section-title">2. Authentication</div>
        <div class="btn-row">
          <button onclick="sendAuth('stub')" class="success">Stub Auth</button>
          <button onclick="sendAuth('authenticated')">Authenticated Auth</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">3. Mode</div>
        <div class="btn-row">
          <button onclick="sendMode('preview')">Preview</button>
          <button onclick="sendMode('edit')" class="primary">Edit</button>
          <button onclick="sendMode('readonly')">Readonly</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">4. Load Asset Data</div>
        <textarea id="assetData">{
  "canvasData": {
    "nodes": [
      { "id": "q1", "type": "SHORT_TEXT", "question": "Full Name", "required": true },
      { "id": "q2", "type": "EMAIL", "question": "Email Address", "required": true },
      { "id": "q3", "type": "MULTIPLE_CHOICE", "question": "Preferred Contact Method", "required": false, "options": ["Email", "Phone", "SMS"] }
    ],
    "edges": [
      { "from": "q1", "to": "q2" },
      { "from": "q2", "to": "q3" }
    ]
  }
}</textarea>
        <div class="btn-row">
          <button onclick="loadAsset()" class="primary">Load Asset</button>
          <button onclick="updateAsset()">Update Asset</button>
          <button onclick="loadSampleWorkflow()">Sample Workflow</button>
          <button onclick="loadSampleSequence()">Sample Sequence</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">5. Theme</div>
        <div class="btn-row">
          <button onclick="sendTheme('light')">Light Theme</button>
          <button onclick="sendTheme('dark')">Dark Theme</button>
        </div>
      </div>
    </div>

    <div class="log-area">
      <div class="section-title">
        Message Log
        <button onclick="clearLog()">Clear</button>
      </div>
      <div class="log-entries" id="logEntries"></div>
    </div>
  </div>

  <div class="canvas-area">
    <div class="canvas-toolbar">
      <span style="font-size:13px;font-weight:500;">Embedded Canvas</span>
      <div class="status">
        <span class="dot waiting" id="statusDot"></span>
        <span id="statusText">Waiting for ready...</span>
      </div>
    </div>
    <iframe id="embedFrame" src="/embed?type=form"></iframe>
  </div>

  <script>
    const iframe = document.getElementById('embedFrame');
    const logEntries = document.getElementById('logEntries');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    let embedState = 'waiting';

    function reloadIframe() {
      const type = document.getElementById('assetType').value;
      iframe.src = `/embed?type=${type}`;
      updateStatus('waiting', 'Waiting for ready...');
    }

    function updateStatus(state, text) {
      embedState = state;
      statusDot.className = `dot ${state}`;
      statusText.textContent = text;
    }

    function addLog(direction, data) {
      const entry = document.createElement('div');
      const time = new Date().toLocaleTimeString('en-US', { hour12: false, fractionalSecondDigits: 3 });
      entry.className = `log-entry ${direction}`;
      const label = direction === 'inbound' ? '\u2190 IN' : '\u2192 OUT';
      entry.innerHTML = `<span class="time">${time}</span><strong>${label}</strong> ${JSON.stringify(data).substring(0, 200)}`;
      logEntries.appendChild(entry);
      logEntries.scrollTop = logEntries.scrollHeight;
    }

    function clearLog() {
      logEntries.innerHTML = '';
    }

    function postToEmbed(msg) {
      addLog('outbound', msg);
      iframe.contentWindow.postMessage(msg, '*');
    }

    function sendAuth(mode) {
      postToEmbed({
        action: 'setAuth',
        mode: mode,
        token: mode === 'stub' ? 'stub-token-for-testing' : 'real-jwt-token-here',
        userId: 'test-user-123',
        workspaceId: 'test-workspace-456',
      });
    }

    function sendMode(mode) {
      postToEmbed({ action: 'setMode', mode: mode });
    }

    function loadAsset() {
      const textarea = document.getElementById('assetData');
      try {
        const data = JSON.parse(textarea.value);
        const type = document.getElementById('assetType').value;
        postToEmbed({ action: 'loadAsset', type: type, data: data });
      } catch (e) {
        addLog('error', { error: 'Invalid JSON: ' + e.message });
      }
    }

    function updateAsset() {
      const textarea = document.getElementById('assetData');
      try {
        const data = JSON.parse(textarea.value);
        postToEmbed({ action: 'updateAsset', mode: 'replace', data: data });
      } catch (e) {
        addLog('error', { error: 'Invalid JSON: ' + e.message });
      }
    }

    function sendTheme(mode) {
      postToEmbed({
        action: 'setTheme',
        theme: {
          mode: mode,
          primaryColor: mode === 'dark' ? '#3b82f6' : '#2563eb',
          fontFamily: 'Inter, system-ui, sans-serif',
        },
      });
    }

    function loadSampleWorkflow() {
      document.getElementById('assetType').value = 'workflow';
      document.getElementById('assetData').value = JSON.stringify({
        canvasData: {
          nodes: [
            { id: 'trigger', type: 'SHORT_TEXT', question: 'Trigger: Form Submitted' },
            { id: 'condition', type: 'YES_NO', question: 'Check: Is Valid?' },
            { id: 'action1', type: 'EMAIL', question: 'Send Confirmation Email' },
            { id: 'action2', type: 'SHORT_TEXT', question: 'Log to Database' },
          ],
          edges: [
            { from: 'trigger', to: 'condition' },
            { from: 'condition', to: 'action1', label: 'Yes' },
            { from: 'condition', to: 'action2', label: 'No' },
          ],
        },
      }, null, 2);
    }

    function loadSampleSequence() {
      document.getElementById('assetType').value = 'sequence';
      document.getElementById('assetData').value = JSON.stringify({
        canvasData: {
          nodes: [
            { id: 'start', type: 'SHORT_TEXT', question: 'Start Sequence' },
            { id: 'step1', type: 'EMAIL', question: 'Send Welcome Email' },
            { id: 'step2', type: 'SHORT_TEXT', question: 'Wait 2 Days' },
            { id: 'step3', type: 'EMAIL', question: 'Send Follow-up Email' },
          ],
          edges: [
            { from: 'start', to: 'step1' },
            { from: 'step1', to: 'step2' },
            { from: 'step2', to: 'step3' },
          ],
        },
      }, null, 2);
    }

    window.addEventListener('message', (event) => {
      if (event.source !== iframe.contentWindow) return;
      const data = event.data;
      if (!data || !data.event) return;

      addLog('inbound', data);

      switch (data.event) {
        case 'ready':
          updateStatus('ready', 'Ready \u2014 waiting for auth');
          break;
        case 'authConfigured':
          updateStatus('ready', `Auth: ${data.mode}`);
          break;
        case 'assetLoaded':
          updateStatus('loaded', `Loaded: ${data.nodeCount} nodes`);
          break;
        case 'assetUpdated':
          updateStatus('loaded', 'Asset updated');
          break;
        case 'error':
          updateStatus('error', `Error: ${data.message}`);
          break;
      }
    });
  </script>
</body>
</html>
